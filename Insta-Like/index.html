<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta-Like</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>

    <div class="con">
        <img src="https://images.unsplash.com/photo-1521577352947-9bb58764b69a?q=80&w=686&auto=format&fit=crop"
            alt="like">

        <div class="top-bar">
            <div class="user-info">
                <div class="avatar">AK</div>
                <div>
                    <p class="username">sonam_mam</p>
                    <p class="location">Mumbai, India</p>
                </div>
            </div>
            <i class="ri-more-fill more-icon"></i>
        </div>

        <i id="icon" class="ri-heart-fill"></i>

        <div class="bottom-bar">
            <div class="actions">
                <div class="left-actions">
                    <i id="heart-btn" class="ri-heart-line action-icon"></i>
                    <i class="ri-chat-3-line action-icon"></i>
                    <i class="ri-send-plane-line action-icon"></i>
                </div>
                <i class="ri-bookmark-line action-icon"></i>
            </div>
            <p class="likes-count"><span id="like-num">2,847</span> likes</p>
            <p class="caption"><span class="caption-user">akash.dev</span> Golden hour hits different 🌅</p>
            <p class="time">2 hours ago</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
