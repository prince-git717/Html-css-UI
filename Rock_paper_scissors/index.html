<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="noise"></div>

  <div class="container">

    <header>
      <div class="title-block">
        <span class="label">THE GAME OF</span>
        <h1>ROCK<br>PAPER<br>SCISSORS</h1>
      </div>
      <div class="scoreboard">
        <div class="score-item">
          <span class="score-label">P1</span>
          <span class="score-val" id="score1">0</span>
        </div>
        <div class="score-divider">:</div>
        <div class="score-item">
          <span class="score-val" id="score2">0</span>
          <span class="score-label">P2</span>
        </div>
      </div>
    </header>

    <div class="arena">

      <!-- Player 1 -->
      <div class="player-zone" id="zone1">
        <p class="player-tag">— PLAYER 1 —</p>
        <div class="choices">
          <button class="choice-btn" data-player="1" data-choice="rock">
            <span class="icon">🪨</span>
            <span class="choice-name">ROCK</span>
          </button>
          <button class="choice-btn" data-player="1" data-choice="paper">
            <span class="icon">📄</span>
            <span class="choice-name">PAPER</span>
          </button>
          <button class="choice-btn" data-player="1" data-choice="scissors">
            <span class="icon">✂️</span>
            <span class="choice-name">SCISSORS</span>
          </button>
        </div>
        <div class="selected-display" id="selected1">
          <span class="selected-icon" id="icon1">?</span>
        </div>
      </div>

      <!-- VS Divider -->
      <div class="vs-block">
        <div class="vs-text">VS</div>
        <div class="fight-btn-wrap">
          <button class="fight-btn" id="fightBtn" disabled>
            FIGHT
          </button>
        </div>
      </div>

      <!-- Player 2 -->
      <div class="player-zone" id="zone2">
        <p class="player-tag">— PLAYER 2 —</p>
        <div class="choices">
          <button class="choice-btn" data-player="2" data-choice="rock">
            <span class="icon">🪨</span>
            <span class="choice-name">ROCK</span>
          </button>
          <button class="choice-btn" data-player="2" data-choice="paper">
            <span class="icon">📄</span>
            <span class="choice-name">PAPER</span>
          </button>
          <button class="choice-btn" data-player="2" data-choice="scissors">
            <span class="icon">✂️</span>
            <span class="choice-name">SCISSORS</span>
          </button>
        </div>
        <div class="selected-display" id="selected2">
          <span class="selected-icon" id="icon2">?</span>
        </div>
      </div>

    </div>

    <!-- Result Banner -->
    <div class="result-banner" id="resultBanner">
      <div class="result-text" id="resultText"></div>
    </div>

    <!-- Reset -->
    <div class="controls">
      <button class="reset-btn" id="resetBtn">↺ RESET ROUND</button>
      <button class="reset-score-btn" id="resetScoreBtn">CLEAR SCORES</button>
    </div>

    <!-- History -->
    <div class="history-wrap">
      <p class="history-title">MATCH HISTORY</p>
      <div class="history-list" id="historyList">
        <span class="history-empty">No rounds played yet.</span>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
